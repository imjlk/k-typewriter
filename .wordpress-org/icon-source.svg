<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Stroke by stroke typing effect Block icon</title>
  <desc id="desc">Rounded dark square with three text strokes and a typing cursor.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a2234"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(188 70) rotate(125) scale(58 62)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9f6d" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ff9f6d" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#09101b" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="208" height="208" rx="48" fill="url(#bg)"/>
  <circle cx="188" cy="70" r="52" fill="url(#glow)"/>

  <g fill="none" stroke="#f8f4ea" stroke-linecap="round" filter="url(#shadow)">
    <path d="M64 84H174" stroke-width="20"/>
    <path d="M64 128H138" stroke-width="20"/>
    <path d="M64 172H184" stroke-width="20"/>
  </g>

  <rect x="154" y="100" width="12" height="56" rx="6" fill="#ff8c5a"/>
</svg>
