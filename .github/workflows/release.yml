name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    PLAYWRIGHT_BASE_URL: http://localhost:8888
    WP_ENV_PORT: 8888
    WP_ENV_CORE_MINIMUM: WordPress/WordPress#6.6
    WP_ENV_CORE_WORDPRESS_70: https://wordpress.org/wordpress-7.0.zip

jobs:
    release:
        runs-on: ubuntu-latest
        env:
            SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
            SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.20.0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  cache: pnpm
                  node-version: '24'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright browser
              run: pnpm exec playwright install --with-deps chromium

            - name: Lint JavaScript
              run: pnpm run lint:js

            - name: Lint styles
              run: pnpm run lint:css

            - name: Run unit tests
              run: pnpm run test:unit

            - name: Build plugin
              run: pnpm run build

            - name: Reset Docker auth for wp-env images
              run: |
                  mkdir -p "$HOME/.docker"
                  printf '{}\n' > "$HOME/.docker/config.json"
                  docker logout || true

            - name: Start wp-env (WordPress 6.6 minimum)
              env:
                  WP_ENV_CORE: ${{ env.WP_ENV_CORE_MINIMUM }}
              run: pnpm run env:start

            - name: Upgrade database (WordPress 6.6 minimum)
              env:
                  WP_ENV_CORE: ${{ env.WP_ENV_CORE_MINIMUM }}
              run: pnpm exec wp-env run cli wp core update-db --allow-root

            - name: Smoke test (WordPress 6.6 minimum)
              run: pnpm run test:smoke

            - name: Stop wp-env (WordPress 6.6 minimum)
              if: always()
              env:
                  WP_ENV_CORE: ${{ env.WP_ENV_CORE_MINIMUM }}
              run: pnpm run env:stop || true

            - name: Start wp-env (WordPress 7.0 stable)
              env:
                  WP_ENV_CORE: ${{ env.WP_ENV_CORE_WORDPRESS_70 }}
              run: pnpm run env:start

            - name: Upgrade database (WordPress 7.0 stable)
              env:
                  WP_ENV_CORE: ${{ env.WP_ENV_CORE_WORDPRESS_70 }}
              run: pnpm exec wp-env run cli wp core update-db --allow-root

            - name: Smoke test (WordPress 7.0 stable)
              run: pnpm run test:smoke

            - name: Build tested release zip
              run: pnpm run plugin-zip

            - name: Verify tested release zip
              run: test -f "./sbs-typing-effect-block.zip"

            - name: Upload Playwright artifacts
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-artifacts
                  path: |
                      test-results
                      playwright-report
                  if-no-files-found: ignore

            - name: Stop wp-env (WordPress 7.0 stable)
              if: always()
              env:
                  WP_ENV_CORE: ${{ env.WP_ENV_CORE_WORDPRESS_70 }}
              run: pnpm run env:stop || true

            - name: Deploy to WordPress.org
              if: ${{ vars.WPORG_DEPLOY_ENABLED == 'true' && env.SVN_USERNAME != '' && env.SVN_PASSWORD != '' }}
              id: deploy
              uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2
              env:
                  SLUG: sbs-typing-effect-block
                  SVN_USERNAME: ${{ env.SVN_USERNAME }}
                  SVN_PASSWORD: ${{ env.SVN_PASSWORD }}

            - name: Create GitHub release
              uses: softprops/action-gh-release@v3
              with:
                  files: ./sbs-typing-effect-block.zip
                  generate_release_notes: true
